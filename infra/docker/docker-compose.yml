services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: gongbi
      POSTGRES_USER: gongbi
      POSTGRES_PASSWORD: gongbi
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../sql:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_API_HOST_PORT:-9010}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9011}:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
      args:
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        no_proxy: ${no_proxy:-}
        NO_PROXY: ${NO_PROXY:-}
    env_file:
      - ../../.env
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    volumes:
      - ../../runtime:/app/runtime
      - ../../configs:/app/configs
      - ../../services:/app/services
      - ../../tests:/app/tests
      - ${MODEL_HOST_PATH:-../../runtime/models}:/models:ro
    ports:
      - "8000:8000"

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
      args:
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        no_proxy: ${no_proxy:-}
        NO_PROXY: ${NO_PROXY:-}
    env_file:
      - ../../.env
    command: ["celery", "-A", "services.worker.celery_app.celery_app", "worker", "-Q", "default", "--loglevel=info", "--concurrency=1", "--pool=solo"]
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    volumes:
      - ../../runtime:/app/runtime
      - ../../configs:/app/configs
      - ../../services:/app/services
      - ${MODEL_HOST_PATH:-../../runtime/models}:/models:ro

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    env_file:
      - ../../.env
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ../../apps/web:/app
      - /app/node_modules
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  minio_data:
