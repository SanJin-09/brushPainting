services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: gongbi
      POSTGRES_USER: gongbi
      POSTGRES_PASSWORD: gongbi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../sql:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - ../../.env
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    volumes:
      - ../../runtime:/app/runtime
      - ../../configs:/app/configs
      - ../../services:/app/services
      - ../../tests:/app/tests
    ports:
      - "8000:8000"

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    env_file:
      - ../../.env
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    gpus: all
    volumes:
      - ../../runtime:/app/runtime
      - ../../configs:/app/configs
      - ../../services:/app/services

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    env_file:
      - ../../.env
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ../../apps/web:/app
      - /app/node_modules
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  minio_data:
