services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"

  api:
    image: brush-painting-api:offline
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    environment: &backend_environment
      APP_ENV: development
      DATABASE_URL: sqlite:////app/runtime/db.sqlite
      REDIS_URL: redis://redis:6379/0
      RQ_QUEUE_NAME: gpu
      RQ_MAX_QUEUED_JOBS: "50"
      RUNTIME_ROOT: /app/runtime
      PUBLIC_MEDIA_BASE: http://localhost:8000/media
      MAX_UPLOAD_FILES: "5"
      MAX_UPLOAD_BYTES: "20971520"
      MAX_IMAGE_EDGE: "8192"
      THUMBNAIL_MAX_EDGE: "480"
      MODEL_BACKEND: mock
      QWEN_EDIT_MODEL_PATH: /models/qwen_image_edit_2511
      QWEN_IMAGE_COMPONENTS_PATH: /models/qwen_image
      QWEN_EDIT_PROCESSOR_PATH: /models/qwen_image_edit/processor
      GONGBI_LORA_PATH: /models/lora/qwen_image_edit_2511_gongbi_lora_v1.safetensors
      GONGBI_LORA_SCALE: "1.0"
      QWEN_IMAGE_STEPS: "40"
      SAM3_BACKEND: mock
      SAM3_PRELOAD: "false"
      SAM3_CHECKPOINT_PATH: /models/sam3/sam3.pt
      SAM3_DEVICE: cuda
      SAM3_SCORE_THRESHOLD: "0.30"
      SEGMENT_MAX_RESULTS: "12"
      SEGMENT_MIN_AREA_RATIO: "0.015"
    restart: unless-stopped
    depends_on:
      - redis
    volumes:
      - ../../runtime:/app/runtime
      - ../../services:/app/services
      - ${MODEL_HOST_PATH:-../../runtime/models}:/models:ro
    ports:
      - "8000:8000"

  worker:
    image: brush-painting-worker:offline
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    environment: *backend_environment
    restart: unless-stopped
    depends_on:
      - redis
    volumes:
      - ../../runtime:/app/runtime
      - ../../services:/app/services
      - ${MODEL_HOST_PATH:-../../runtime/models}:/models:ro

  web:
    image: brush-painting-web:offline
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    environment:
      VITE_API_BASE: http://localhost:8000/api
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ../../apps/web:/app
      - /app/node_modules
    ports:
      - "5173:5173"
