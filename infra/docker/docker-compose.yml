services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?请在 .env 中设置至少 32 位的 REDIS_PASSWORD}
    expose:
      - "6379"
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6380}:6379"
    command:
      - sh
      - -c
      - exec redis-server --requirepass "$$REDIS_PASSWORD"
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$$REDIS_PASSWORD\" redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    image: brush-painting-api:offline
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    environment: &backend_environment
      APP_ENV: ${APP_ENV:-development}
      API_LISTEN_HOST: 0.0.0.0
      API_PUBLISH_HOST: ${API_PUBLISH_HOST:-127.0.0.1}
      API_AUTH_MODE: ${API_AUTH_MODE:-disabled}
      BRUSH_API_KEYS: ${BRUSH_API_KEYS:-}
      API_SESSION_SECRET: ${API_SESSION_SECRET:-}
      API_SESSION_TTL_SECONDS: ${API_SESSION_TTL_SECONDS:-43200}
      API_SESSION_COOKIE_SECURE: ${API_SESSION_COOKIE_SECURE:-false}
      API_DOCS_ENABLED: ${API_DOCS_ENABLED:-true}
      DATABASE_URL: sqlite:////app/runtime/db.sqlite
      REDIS_URL: redis://redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:?请在 .env 中设置至少 32 位的 REDIS_PASSWORD}
      RQ_QUEUE_NAME: gpu
      RQ_MAX_QUEUED_JOBS: "50"
      RUNTIME_ROOT: /app/runtime
      PUBLIC_MEDIA_BASE: ${PUBLIC_MEDIA_BASE:-http://localhost:8000/media}
      MAX_UPLOAD_FILES: "5"
      MAX_UPLOAD_BYTES: "20971520"
      MAX_IMAGE_EDGE: "8192"
      THUMBNAIL_MAX_EDGE: "480"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,api}
      MODEL_BACKEND: mock
      QWEN_EDIT_MODEL_PATH: /models/qwen_image_edit_2511
      QWEN_IMAGE_COMPONENTS_PATH: /models/qwen_image
      QWEN_EDIT_PROCESSOR_PATH: /models/qwen_image_edit/processor
      GONGBI_LORA_PATH: /models/lora/qwen_image_edit_2511_gongbi_lora_v1.safetensors
      GONGBI_LORA_SCALE: "1.0"
      QWEN_IMAGE_STEPS: "40"
      SAM3_BACKEND: mock
      SAM3_PRELOAD: "false"
      SAM3_MODEL_SOURCE: ${SAM3_MODEL_SOURCE:-modelscope}
      SAM3_CHECKPOINT_PATH: ${SAM3_CHECKPOINT_PATH:-/models/sam3/sam3.pt}
      SAM3_MODELSCOPE_MODEL_ID: ${SAM3_MODELSCOPE_MODEL_ID:-facebook/sam3}
      SAM3_MODELSCOPE_REVISION: ${SAM3_MODELSCOPE_REVISION:-master}
      SAM3_MODELSCOPE_LOCAL_DIR: ${SAM3_MODELSCOPE_LOCAL_DIR:-/app/runtime/models/sam3}
      SAM3_MODELSCOPE_CHECKPOINT_FILENAME: ${SAM3_MODELSCOPE_CHECKPOINT_FILENAME:-sam3.pt}
      SAM3_MODELSCOPE_DOWNLOAD_FULL: ${SAM3_MODELSCOPE_DOWNLOAD_FULL:-false}
      SAM3_DEVICE: cuda
      SAM3_AMP_DTYPE: bfloat16
      SAM3_SCORE_THRESHOLD: "0.30"
      SEGMENT_MAX_RESULTS: "12"
      SEGMENT_MIN_AREA_RATIO: "0.015"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../../runtime:/app/runtime
      - ../../services:/app/services
      - ${MODEL_HOST_PATH:-../../runtime/models}:/models:ro
    ports:
      - "${API_PUBLISH_HOST:-127.0.0.1}:${APP_PORT:-8000}:8000"

  worker:
    image: brush-painting-worker:offline
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    environment: *backend_environment
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../../runtime:/app/runtime
      - ../../services:/app/services
      - ${MODEL_HOST_PATH:-../../runtime/models}:/models:ro

  web:
    image: brush-painting-web:offline
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000/api}
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ../../apps/web:/app
      - /app/node_modules
    ports:
      - "${WEB_PUBLISH_HOST:-127.0.0.1}:${WEB_PORT:-5173}:5173"
